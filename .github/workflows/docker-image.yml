name: Build Docker Images And Upload To Google Drive

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y gzip xz-utils curl

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FSXEDX_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      - name: Verify rclone
        run: |
          rclone version
          rclone listremotes

      # 编译主程序镜像
      - name: Build Osiris Image
        run: |
          docker build \
            -t osiris:latest \
            .

      # 编译 Intel 后端镜像
      - name: Build Osiris Intel Image
        run: |
          docker build \
            -t osiris-intel:latest \
            ./intel

      # 下载 nginx 官方镜像
      - name: Pull Nginx Image
        run: |
          docker pull nginx:alpine

      - name: Show Images
        run: |
          docker images

      # 保存三个镜像到一个 tar
      - name: Save Docker Images
        run: |
          docker save \
            osiris:latest \
            osiris-intel:latest \
            nginx:alpine \
            -o all_images.tar

      - name: Compress Images
        run: |
          xz -T0 -6 all_images.tar

      - name: Show Archive Size
        run: |
          ls -lh all_images.tar.xz

      - name: Create Google Drive Folder
        run: |
          rclone mkdir Google:/backup || true

      - name: Upload To Google Drive
        run: |
          rclone copy \
            all_images.tar.xz \
            Google:/backup/

      - name: Verify Upload
        run: |
          rclone lsf Google:/backup/
