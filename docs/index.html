<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#d4af37">
  <title>OSIRIS</title>
  <meta name="description" content="Interactive OSIRIS globe for GitHub Pages.">
  <link rel="stylesheet" href="./styles.css?v=20260613-performance-cables">
</head>
<body>
  <div class="boot" id="boot" aria-live="polite">
    <div class="boot-noise"></div>
    <div class="boot-mark">OSIRIS</div>
    <div class="boot-sequence" id="bootSequence">INITIALIZING MAP...</div>
  </div>

  <main class="osiris-live" aria-label="Interactive globe">
    <canvas id="globeCanvas" class="globe-canvas" aria-label="Interactive 3D world map"></canvas>
    <div class="space-vignette" aria-hidden="true"></div>
    <div class="scan-lines" aria-hidden="true"></div>

    <header class="live-header">
      <div class="brand-row">
        <h1>OSIRIS</h1>
        <p>MAP COMMAND</p>
        <a class="support-pill" href="https://github.com/DeerSpotter/osiris-v2" target="_blank" rel="noreferrer">● SUPPORT PROJECT</a>
      </div>
      <div class="system-copy">POWERED BY OPEN SOURCE MAP ENGINE · LIVE REPO CACHE</div>
    </header>

    <section class="telemetry-card" aria-label="Live telemetry">
      <span id="zulu">ZULU --:--:--Z</span>
      <span>SYS <strong id="systemState">LOADING</strong></span>
      <span><strong id="feedCount">0</strong> FEEDS</span>
      <span id="readout">LOADING REPO CACHE</span>
    </section>

    <section class="event-card" aria-label="Selected layer">
      <span class="event-kicker">MAP LAYER</span>
      <strong id="eventTitle">CONNECTING TO REPO DATA CACHE</strong>
      <span id="eventMeta">DRAG TO ORBIT · PINCH OR WHEEL TO ZOOM</span>
    </section>

    <div class="floating-actions" aria-label="Globe controls">
      <button type="button" id="locateBtn" aria-label="Focus North America"><span class="pin-icon"></span></button>
      <button type="button" id="orbitBtn" aria-label="Toggle cable routes"><span class="orbit-icon"></span></button>
    </div>

    <nav class="bottom-nav" aria-label="Map navigation">
      <button type="button" data-layer="layers"><span class="nav-icon">▱</span><small>LAYERS</small></button>
      <button type="button" data-layer="markets"><span class="nav-icon">▥</span><small>MARKETS</small></button>
      <button type="button" data-layer="intel"><span class="nav-icon">▤</span><small>INTEL</small></button>
      <button type="button" class="active" data-layer="recon"><span class="nav-icon">◎</span><small>RECON</small></button>
      <button type="button" data-layer="search"><span class="nav-icon">⌕</span><small>SEARCH</small></button>
    </nav>
  </main>

  <script src="./osiris-live-cache.js?v=20260613-static-shell"></script>
  <script src="./osiris-interaction-tuning.js?v=20260614-zoom-labels"></script>
  <script src="./osiris-panel-selection.js?v=20260614-panel-select"></script>
  <script src="./osiris-map-controls.js?v=20260614-map-controls"></script>
  <script src="./osiris-street-map-fix.js?v=20260614-street-level"></script>
  <script src="./osiris-pan-fix.js?v=20260614-pan-fix"></script>
</body>
</html>
