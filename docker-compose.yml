name: osiris
services:
  osiris:
    # Pulls the prebuilt image from GitHub Container Registry. The `build:`
    # block is kept as a fallback: `docker compose up -d` uses the registry
    # image if present/pullable, otherwise builds locally from the Dockerfile.
    # Run `docker compose pull` to fetch the latest published image.
    image: ghcr.io/aiacos/osiris:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osiris
    ports:
      - "${OSIRIS_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgres://osiris:osiris_pass@osiris-db:5432/osiris
      - MINIO_ENDPOINT=http://osiris-minio:9000
      - REDIS_URL=redis://osiris-redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      osiris-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

  osiris-cache:
    image: nginx:alpine
    container_name: osiris-cache
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - osiris
    restart: unless-stopped
    networks:
      - default

  osiris-intel:
    build:
      context: ./intel
      dockerfile: Dockerfile
    container_name: osiris-intel
    ports:
      - "4000:4000"
    restart: unless-stopped
    networks:
      - default

  # ═══════════════════════════════════════════════════════════════
  # Phase 0 — Foundry Backbone: Durable Data Services
  # ═══════════════════════════════════════════════════════════════
  # Postgres 16 with pgvector (semantic search) and Apache AGE (graph)
  osiris-db:
    build:
      context: ./osiris-foundation/db
      dockerfile: Dockerfile
    container_name: osiris-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=osiris
      - POSTGRES_PASSWORD=osiris_pass
      - POSTGRES_DB=osiris
    volumes:
      - osiris-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osiris"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

  # MinIO: S3-compatible object store for raw blobs (PDFs, images, audio)
  osiris-minio:
    image: minio/minio:latest
    container_name: osiris-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=osiris
      - MINIO_ROOT_PASSWORD=osiris_minio_pass
    volumes:
      - osiris-minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - default

  # Redis: Session cache, rate limiting, pub/sub
  osiris-redis:
    image: redis:7-alpine
    container_name: osiris-redis
    ports:
      - "6379:6379"
    volumes:
      - osiris-redis-data:/data
    restart: unless-stopped
    networks:
      - default

volumes:
  nginx-cache:
  osiris-pgdata:
  osiris-minio-data:
  osiris-redis-data:

networks:
  umami_default:
    external: true
